<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 184 120" width="184" height="120">
<defs>
<style>
  .bg  { fill: #0d0f1c }
  .chr { fill: #171a28 }
  .blk { fill: #1c1f30 }
  .dim { fill: #252840 }
  .sbk { fill: #1a1d2e }
  .sbt { fill: #2d3050 }
  @media (prefers-color-scheme: light) {
    .bg  { fill: #f0f4f8 }
    .chr { fill: #e2e8f0 }
    .blk { fill: #ffffff }
    .dim { fill: #cdd5e0 }
    .sbk { fill: #e2e8f0 }
    .sbt { fill: #b0bac8 }
  }

  /* scroll group: content + zone move together */
  .sc-g { animation: scroll 6s ease-in-out infinite }
  @keyframes scroll {
    0%,47%   { transform: translateY(0px)   }
    74%,86%  { transform: translateY(-28px) }
    95%,100% { transform: translateY(0px)   }
  }

  /* zone label: appears after zone is fully drawn */
  .zone-lbl { animation: zlbl 6s ease-in-out infinite }
  @keyframes zlbl {
    0%,40%   { opacity: 0 }
    44%      { opacity: 1 }
    88%      { opacity: 1 }
    93%      { opacity: 0 }
    100%     { opacity: 0 }
  }

  /* cursor: drag zone, then return to top-right while scroll plays */
  .cur { animation: cur 6s ease-in-out infinite }
  @keyframes cur {
    0%,7%  { transform: translate(132px,26px); opacity:1 }
    13%    { transform: translate(14px,56px);  opacity:1; animation-timing-function: linear }
    40%    { transform: translate(110px,84px); opacity:1 }
    50%    { transform: translate(132px,26px); opacity:1 }
    88%    { transform: translate(132px,26px); opacity:1 }
    93%    { transform: translate(132px,26px); opacity:0 }
    99%    { transform: translate(132px,26px); opacity:0 }
    100%   { transform: translate(132px,26px); opacity:1 }
  }

  /* scrollbar thumb */
  .sbt-el { animation: sth 6s ease-in-out infinite }
  @keyframes sth {
    0%,47%   { transform: translateY(0px)  }
    74%,86%  { transform: translateY(20px) }
    95%,100% { transform: translateY(0px)  }
  }
</style>
<!-- clip: hides content outside the page area (below chrome bar) -->
<clipPath id="clip">
  <rect x="0" y="18" width="184" height="102"/>
</clipPath>
</defs>

<rect width="184" height="120" class="bg"/>

<!-- chrome bar -->
<rect x="0" y="0" width="184" height="18" class="chr"/>
<rect x="10" y="5" width="8" height="8" rx="4" fill="#FF5F56"/>
<rect x="42" y="4" width="100" height="10" rx="5" class="blk"/>

<!-- outer clip wrapper (no transform) -->
<g clip-path="url(#clip)">
  <!-- inner scroll group (transform only, no clip) -->
  <g class="sc-g">

    <!-- rows above zone -->
    <rect x="14" y="24" width="150" height="6" rx="3" class="dim"/>
    <rect x="14" y="34" width="110" height="6" rx="3" class="dim"/>
    <rect x="14" y="44" width="136" height="6" rx="3" class="dim"/>

    <!-- content rows inside zone area (visible through zone fill) -->
    <rect x="14" y="60" width="88" height="5" rx="2" class="dim"/>
    <rect x="14" y="70" width="64" height="5" rx="2" class="dim"/>
    <rect x="14" y="79" width="76" height="5" rx="2" class="dim"/>

    <!-- zone: fill + dashed border drawn via SMIL -->
    <!-- zone top-left (14,56), grows to width=96, height=28 → bottom-right (110,84) -->
    <rect x="14" y="56" rx="4" width="0" height="0"
          fill="#f5c518" fill-opacity="0.14"
          stroke="#f5c518" stroke-width="1.4" stroke-dasharray="5 3">
      <animate attributeName="width"  values="0;0;96;96" keyTimes="0;0.13;0.40;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="height" values="0;0;28;28" keyTimes="0;0.13;0.40;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.13;0.40;0.88;0.93;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- BLUR label pill (fades in after zone is drawn) -->
    <g class="zone-lbl">
      <rect x="14" y="56" width="28" height="11" rx="3" fill="#f5c518"/>
      <text x="28" y="64.5" text-anchor="middle"
            font-family="monospace" font-size="5.5" font-weight="bold" fill="#0d0f1c">BLUR</text>
    </g>

    <!-- rows below zone -->
    <rect x="14" y="92"  width="150" height="6" rx="3" class="dim"/>
    <rect x="14" y="102" width="108" height="6" rx="3" class="dim"/>
    <rect x="14" y="112" width="130" height="6" rx="3" class="dim"/>
    <rect x="14" y="122" width="88"  height="6" rx="3" class="dim"/>

  </g>
</g>

<!-- scrollbar (outside clip; fixed) -->
<rect x="178" y="18" width="3" height="100" rx="1.5" class="sbk"/>
<g class="sbt-el">
  <rect x="178" y="22" width="3" height="18" rx="1.5" class="sbt"/>
</g>

<!-- cursor -->
<g class="cur">
  <polygon points="0,0 0,12 3.5,9 6,14.5 7.6,13.7 5,8.5 10,8.5"
           fill="#1e293b" stroke="white" stroke-width="1" stroke-linejoin="round"/>
</g>

<!-- press dot: pure SMIL, no CSS class conflict -->
<circle fill="#f5c518" r="0" cx="14" cy="56">
  <animate attributeName="cx" values="14;14;110;110;132" keyTimes="0;0.13;0.40;0.47;1"  dur="6s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="56;56;84;84;26"   keyTimes="0;0.13;0.40;0.47;1"  dur="6s" repeatCount="indefinite"/>
  <animate attributeName="r"       values="0;3.5;3.5;0;0" keyTimes="0;0.13;0.39;0.44;1" dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.85;0.85;0;0" keyTimes="0;0.13;0.39;0.44;1" dur="6s" repeatCount="indefinite"/>
</circle>
</svg>

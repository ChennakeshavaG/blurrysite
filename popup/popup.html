<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blurry Site</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="renders/howtoblur.css">
  <link rel="stylesheet" href="renders/protect.css">
  <link rel="stylesheet" href="renders/triggers.css">
  <link rel="stylesheet" href="renders/keyboard.css">
  <link rel="stylesheet" href="renders/site_rules.css">
  <link rel="stylesheet" href="renders/general.css">
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────────────────── -->
  <header class="bl-header" id="bl-header">
    <div class="bl-header__brand">
      <span class="bl-header__logo" id="bl-logo" aria-hidden="true"></span>
      <span class="bl-header__wordmark" data-i18n="popup_title">Blurry Site</span>
    </div>
    <span class="bl-header__host" id="bl-host"></span>
    <button class="bl-icon-btn" id="bl-theme-toggle" data-i18n-aria-label="theme_toggle" data-i18n-title="theme_toggle" aria-label="Switch theme" title="Switch theme">
      <svg class="bl-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      <svg class="bl-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
    </button>
    <button class="bl-icon-btn bl-icon-btn--power" id="bl-power" data-i18n-aria-label="aria_power_toggle" aria-label="Power on/off"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 2v7"/><path d="M6.2 5.2a8 8 0 1 0 11.6 0"/></svg></button>
  </header>

  <!-- ── CONTENT MID (header and footer sit outside; sub-pages anchor here) ── -->
  <div class="bl-mid">

  <!-- ── WELCOME CARD (first-install overlay — JS-rendered by popup.js) ── -->
  <div class="bl-welcome" id="bl-welcome" hidden></div>

  <!-- ── MAIN VIEW ───────────────────────────────────────────────────── -->
  <main class="bl-main" id="bl-view-main">

    <!-- NOTIFICATIONS (site-rule pill + automate trigger cards) -->
    <section class="bl-section bl-notif" id="bl-notif-area"></section>

    <!-- STAY BLURRY (cyan card — JS-rendered by renders/protect.js) -->
    <section class="bl-section" id="bl-stay-blurry"></section>

    <!-- HOW TO BLUR -->
    <section class="bl-section bl-modes" id="bl-modes">
      <div class="bl-section__header">
        <span class="bl-section__title bl-htb-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg><span data-i18n="section_how_to_blur">How to Blur</span></span>
      </div>
      <p class="bl-section__desc" data-i18n="section_how_to_blur_desc">Blur anything. Your way.</p>
      <div id="bl-mode-pick-blur" class="bl-mode-block bl-mode-block--pick-blur"></div>
      <div id="bl-mode-blur-all" class="bl-mode-block bl-mode-block--blur-all"></div>
    </section>

    <!-- SMART TRIGGERS (plain rows — JS-rendered by renders/triggers.js) -->
    <section class="bl-section" id="bl-smart-triggers"></section>

    <!-- NAV ROWS -->
    <nav class="bl-nav-rows" data-i18n-aria-label="aria_settings_nav" aria-label="Settings">
      <button class="bl-nav-row" id="bl-nav-general">
        <span class="bl-nav-row__content">
          <span class="bl-nav-row__label" data-i18n="section_general"></span>
          <span class="bl-nav-row__desc" data-i18n="nav_general_desc"></span>
        </span>
        <span class="bl-nav-row__arrow" aria-hidden="true">→</span>
      </button>
      <button class="bl-nav-row" id="bl-nav-shortcuts">
        <span class="bl-nav-row__content">
          <span class="bl-nav-row__label" data-i18n="section_shortcuts_title">Shortcuts</span>
          <span class="bl-nav-row__desc" data-i18n="nav_shortcuts_desc">Customize keyboard shortcuts for blur actions</span>
        </span>
        <span class="bl-nav-row__arrow" aria-hidden="true">→</span>
      </button>
      <button class="bl-nav-row" id="bl-nav-site-rules">
        <span class="bl-nav-row__content">
          <span class="bl-nav-row__label" data-i18n="section_rules_title">Site Rules</span>
          <span class="bl-nav-row__desc" data-i18n="nav_rules_desc">Configure per-site blur rules and overrides</span>
        </span>
        <span class="bl-nav-row__arrow" aria-hidden="true">→</span>
      </button>
    </nav>

  </main>

  <!-- ── OFF-STATE VIEW ──────────────────────────────────────────────── -->
  <div class="bl-off-view" id="bl-view-off" hidden>
    <span class="bl-off-view__logo" id="bl-logo-off" aria-hidden="true"></span>
    <p class="bl-off-view__msg" data-i18n="off_state_message">Blurry Site is off</p>
    <p class="bl-off-view__hint" data-i18n="off_state_hint">All blur is paused on every site</p>
    <button class="bl-btn-primary bl-off-view__turn-on" id="bl-turn-on" data-i18n="power_turn_on">Turn On</button>
  </div>

  <!-- ── RESTRICTED-PAGE VIEW (Chrome blocks extensions on this URL) ── -->
  <div class="bl-restricted-view" id="bl-view-restricted" hidden>
    <span class="bl-restricted-view__icon" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg>
    </span>
    <p class="bl-restricted-view__msg" data-i18n="restricted_state_title">This page is restricted</p>
    <p class="bl-restricted-view__hint" data-i18n="restricted_state_message">Chrome blocks extensions on the Web Store, the new tab page, and chrome:// pages. Try Blurry Site on a regular website.</p>
  </div>

  <!-- ── SUB-PAGES ───────────────────────────────────────────────────── -->

  <div class="bl-subpage" id="bl-view-htb-modify" hidden>
    <header class="bl-subpage__header">
      <button class="bl-back-btn" data-back="main" data-i18n-aria-label="aria_subpage_close" aria-label="Close"><span><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></span></button>
      <span class="bl-subpage__title" data-i18n="subpage_blur_settings_title">Blur Settings</span>
    </header>
    <div class="bl-subpage__scroll-wrap">
      <div class="bl-sp-arrow bl-sp-arrow--top" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div class="bl-subpage__body" id="bl-htb-modify-body"></div>
      <div class="bl-sp-arrow bl-sp-arrow--bottom" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
  </div>

  <div class="bl-subpage" id="bl-view-shortcuts" hidden>
    <header class="bl-subpage__header">
      <button class="bl-back-btn" data-back="main" data-i18n-aria-label="aria_subpage_close" aria-label="Close"><span><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></span></button>
      <span class="bl-subpage__title" data-i18n="section_shortcuts_title">Shortcuts</span>
    </header>
    <div class="bl-subpage__scroll-wrap">
      <div class="bl-sp-arrow bl-sp-arrow--top" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div class="bl-subpage__body" id="bl-shortcuts-body"></div>
      <div class="bl-sp-arrow bl-sp-arrow--bottom" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
  </div>

  <div class="bl-subpage" id="bl-view-site-rules" hidden>
    <header class="bl-subpage__header">
      <button class="bl-back-btn" data-back="main" data-i18n-aria-label="aria_subpage_close" aria-label="Close"><span><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></span></button>
      <span class="bl-subpage__title" data-i18n="section_rules_title">Site Rules</span>
    </header>
    <div class="bl-subpage__scroll-wrap">
      <div class="bl-sp-arrow bl-sp-arrow--top" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div class="bl-subpage__body" id="bl-site-rules-body"></div>
      <div class="bl-sp-arrow bl-sp-arrow--bottom" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
  </div>

  <div class="bl-subpage" id="bl-view-general" hidden>
    <header class="bl-subpage__header">
      <button class="bl-back-btn" data-back="main" data-i18n-aria-label="aria_subpage_close" aria-label="Close"><span><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></span></button>
      <span class="bl-subpage__title" data-i18n="section_general"></span>
    </header>
    <div class="bl-subpage__scroll-wrap">
      <div class="bl-sp-arrow bl-sp-arrow--top" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div class="bl-subpage__body" id="bl-general-body"></div>
      <div class="bl-sp-arrow bl-sp-arrow--bottom" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
  </div>

  <!-- ── SCROLL ARROWS ────────────────────────────────────────────────── -->
  <div class="bl-scroll-arrow bl-scroll-arrow--top" id="bl-scroll-up" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </div>
  <div class="bl-scroll-arrow bl-scroll-arrow--bottom" id="bl-scroll-down" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  </div><!-- /.bl-mid -->

  <!-- ── FOOTER ────────────────────────────────────────────────────────── -->
  <footer class="bl-footer">
    <span class="bl-footer__version" id="bl-version"></span>
    <a class="bl-footer__btn" id="bl-feedback" href="https://github.com/ChennakeshavaG/blurrysite/issues/new/choose" target="_blank" rel="noopener noreferrer" data-i18n="footer_feedback">Feedback</a>
  </footer>

  <!-- ── TOAST ─────────────────────────────────────────────────────────── -->
  <div class="bl-toast" id="bl-toast" role="status" aria-live="polite" hidden>
    <span class="bl-toast__logo" aria-hidden="true"></span>
    <span class="bl-toast__msg" id="bl-toast-msg"></span>
    <button class="bl-toast__close" id="bl-toast-close" data-i18n-aria-label="aria_toast_dismiss" aria-label="Dismiss">✕</button>
  </div>

  <!-- Scripts: constants → logger → action_registry → shortcut_label → url_matcher → storage_model → renders → state → ui → popup -->
  <script src="../src/constants.js"></script>
  <script src="../src/content_i18n.js"></script>
  <script src="../src/logger.js"></script>
  <script src="../src/action_registry.js"></script>
  <script src="../src/shortcut_label.js"></script>
  <script src="../src/url_matcher.js"></script>
  <script src="../src/automate/state.js"></script>
  <script src="../src/storage_model.js"></script>
  <script src="renders/shared.js"></script>
  <script src="renders/main.js"></script>
  <script src="renders/howtoblur.js"></script>
  <script src="renders/protect.js"></script>
  <script src="renders/triggers.js"></script>
  <script src="renders/keyboard.js"></script>
  <script src="renders/site_rules.js"></script>
  <script src="renders/general.js"></script>
  <script src="popup_state.js"></script>
  <script src="popup_ui.js"></script>
  <script src="popup.js"></script>

</body>
</html>

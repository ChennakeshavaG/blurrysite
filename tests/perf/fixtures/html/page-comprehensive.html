      + `<text x='50%' y='50%' fill='white' text-anchor='middle' dy='.35em' `

    return 'data:image/svg+xml,' + encodeURIComponent(svg);
  }

  // ─── VIDEO via canvas.captureStream ────────────────────────────────────────

  function makeVideoStream(videoEl, colorSeed, width, height) {
    const c = document.createElement('canvas');
    c.width = width;
    c.height = height;
    const ctx = c.getContext('2d');
    let hue = (colorSeed * 37) % 360;
    const idx = videoEl.dataset.idx || '';
    let running = true;
    function draw() {
      if (!running) return;
      ctx.fillStyle = `hsl(${hue++ % 360}, 60%, 45%)`;
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `bold ${Math.floor(height / 7)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Video ' + idx, width / 2, height / 2);
      ctx.font = `${Math.floor(height / 10)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(width + '×' + height, width / 2, height / 2 + Math.floor(height / 6));
      requestAnimationFrame(draw);
    }
    draw();
    try {
      videoEl.srcObject = c.captureStream(15);
      videoEl.play().catch(function () {});
    } catch (e) {
      // captureStream unsupported in this context — leave blank
    }
  }

      cvs.height = 160;
      cvs.style.cssText = 'display:block;max-width:100%;height:auto;';
      cvs.dataset.canvasIndex = String(i);
      wrap.appendChild(cvs);
      gallery.appendChild(wrap);
      // Draw after insertion
      (function (canvas, palette, idx) {
        requestAnimationFrame(function () {
          try {
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, palette[0]);
            grad.addColorStop(1, palette[1]);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Canvas ' + (idx + 1), canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = '12px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText(canvas.width + ' × ' + canvas.height + ' px', canvas.width / 2, canvas.height / 2 + 12);
            // decorative circles
            ctx.beginPath();
            ctx.arc(30, 30, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(canvas.width - 30, canvas.height - 30, 28, 0, Math.PI * 2);
            ctx.fill();
          } catch (e) { /* canvas not available */ }
        });
      }(cvs, canvasPalettes[i], i));
    }

    // --- svg × 10 ---
    const svgColors2 = [
      '#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444',
      '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1',
    ];
    const svgShapes = [
      function (c) { /* circle + rect */
        return '<rect x="10" y="10" width="80" height="80" rx="8" fill="' + c + '"/>'
          + '<circle cx="120" cy="50" r="35" fill="' + c + '" opacity=".7"/>';
      },
      function (c) { /* triangles */
        return '<polygon points="60,10 110,90 10,90" fill="' + c + '"/>'
          + '<polygon points="130,10 180,90 80,90" fill="' + c + '" opacity=".6"/>';
      },
      function (c) { /* path wave */
        return '<path d="M0 50 Q40 10 80 50 Q120 90 160 50 Q200 10 240 50" stroke="' + c + '" stroke-width="4" fill="none"/>'
          + '<path d="M0 80 Q40 40 80 80 Q120 120 160 80 Q200 40 240 80" stroke="' + c + '" stroke-width="3" fill="none" opacity=".5"/>';
      },
      function (c) { /* lines */
        return '<line x1="10" y1="10" x2="230" y2="90" stroke="' + c + '" stroke-width="3"/>'
          + '<line x1="10" y1="50" x2="230" y2="50" stroke="' + c + '" stroke-width="2" opacity=".5"/>'
          + '<line x1="10" y1="90" x2="230" y2="10" stroke="' + c + '" stroke-width="3"/>';
      },
      function (c) { /* ellipses */
        return '<ellipse cx="80" cy="50" rx="70" ry="35" fill="' + c + '" opacity=".8"/>'
          + '<ellipse cx="170" cy="50" rx="50" ry="28" fill="' + c + '" opacity=".5"/>';
      },
      function (c) { /* hexagon-ish polylines */
        return '<polyline points="50,10 90,10 120,50 90,90 50,90 20,50" stroke="' + c + '" stroke-width="3" fill="none"/>'
          + '<polyline points="130,20 170,20 200,50 170,80 130,80 100,50" stroke="' + c + '" stroke-width="2" fill="none" opacity=".6"/>';
      },
      function (c) { /* concentric circles */
        return '<circle cx="120" cy="50" r="45" stroke="' + c + '" stroke-width="3" fill="none"/>'
          + '<circle cx="120" cy="50" r="30" stroke="' + c + '" stroke-width="2" fill="none" opacity=".7"/>'
          + '<circle cx="120" cy="50" r="15" fill="' + c + '"/>';
      },
      function (c) { /* diamond + cross */
        return '<polygon points="120,10 190,50 120,90 50,50" fill="' + c + '" opacity=".8"/>'
          + '<line x1="120" y1="10" x2="120" y2="90" stroke="#fff" stroke-width="2"/>'
          + '<line x1="50" y1="50" x2="190" y2="50" stroke="#fff" stroke-width="2"/>';
      },
      function (c) { /* arcs */
        return '<path d="M30 70 A50 50 0 0 1 130 70" stroke="' + c + '" stroke-width="4" fill="none"/>'
          + '<path d="M80 80 A60 60 0 0 1 200 80" stroke="' + c + '" stroke-width="3" fill="none" opacity=".6"/>';
      },
      function (c) { /* star-like path */
        return '<path d="M120 10 L130 45 L165 45 L138 65 L148 100 L120 80 L92 100 L102 65 L75 45 L110 45 Z" fill="' + c + '"/>';
      },
    ];

    for (let i = 0; i < 10; i++) {
      const wrap = el('div', { style: 'border-radius:6px;overflow:hidden;background:#f5f3ff;padding:8px;' });
      const svgNS = 'http://www.w3.org/2000/svg';
      const svgEl = document.createElementNS(svgNS, 'svg');
      svgEl.setAttribute('xmlns', svgNS);
      svgEl.setAttribute('viewBox', '0 0 240 100');
      svgEl.setAttribute('width', '240');
      svgEl.setAttribute('height', '100');
      svgEl.style.cssText = 'display:block;max-width:100%;height:auto;';
      svgEl.dataset.svgIndex = String(i);
      const inner = svgShapes[i](svgColors2[i]);
      // Use innerHTML on a temp div to parse, then append children
      const tmp = document.createElement('div');
      tmp.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
      const tmpSvg = tmp.querySelector('svg');
      while (tmpSvg && tmpSvg.firstChild) {
        svgEl.appendChild(tmpSvg.firstChild);
      }
      // label text
      const textEl = document.createElementNS(svgNS, 'text');
      textEl.setAttribute('x', '120');
      textEl.setAttribute('y', '96');
      textEl.setAttribute('text-anchor', 'middle');
      textEl.setAttribute('font-size', '8');
      textEl.setAttribute('fill', '#9ca3af');
      textEl.setAttribute('font-family', 'sans-serif');
      textEl.textContent = 'SVG ' + (i + 1);
      svgEl.appendChild(textEl);
      wrap.appendChild(svgEl);
      gallery.appendChild(wrap);
    }
  }());

}());
</script>
</body>
</html>
